<!DOCTYPE html>
<html>
<head>
    <title>Admin - Interview Results</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h2>Admin Panel</h2>

    <table border="1" width="100%" cellpadding="8">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Score</th>
            <th>Total</th>
            <th>Date</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
